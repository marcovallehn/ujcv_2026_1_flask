{% extends 'base.html' %}

{% block titulo %}Editar cliente{% endblock %}

{% block contenido %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow-lg rounded-3">
                <div class="card-header bg-warning text-dark text-center">
                    <h4 class="mb-0">
                        <i class="bi bi-pencil-square"></i> Editar Cliente
                    </h4>
                </div>

                <div class="card-body">
                    <form action="" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="CliNombre"
                                   required maxlength="100" value="{{cliente.1}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" class="form-control" name="CliApellido"
                                   required maxlength="100" value="{{cliente.2}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email" class="form-control" name="CliCorreo"
                                   required maxlength="100" value="{{cliente.3}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" name="CliTelefono"
                                   required maxlength="50" value="{{cliente.4}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <textarea class="form-control" name="CliDireccion" rows="3" required>{{cliente.5}}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/clientes" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Volver
                            </a>

                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Guardar Cambios
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
