{% extends 'base.html' %}

{% block titulo %}Agregar nuevo cliente{% endblock %}

{% block contenido %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg rounded-3">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">Agregar Nuevo Cliente</h4>
                </div>
                <div class="card-body">
                    <form action="" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="CliNombre" required maxlength="100">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" class="form-control" name="CliApellido" required maxlength="100">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email" class="form-control" name="CliCorreo" required maxlength="100">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" name="CliTelefono" required maxlength="50">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <textarea class="form-control" name="CliDireccion" rows="3" required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/clientes" class="btn btn-secondary">Volver</a>
                            <button type="submit" class="btn btn-primary">Agregar Cliente</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
